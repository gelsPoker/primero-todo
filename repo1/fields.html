<html lang="en">
<head>
  <title>Fieldset y legend (simple)</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css"> 
</head>
<body>
  <form>
    <fieldset>
      <legend>Información Personal</legend>
    <input type="text" placeholder="Escribe tu nombre completo">
    <input type="email" placeholder="Escribe tu correo electrónico">
    </fieldset>
    <fieldset>
      <legend>Información de Contacto</legend>
    <input type="edad" placeholder="Escribe tu edad">
    <input type="number" placeholder="Escribe tu telefono">
    </fieldset>
  </form>
</body>

</html>
