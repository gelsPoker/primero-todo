<html lang="en">
<head>
  <title>Formulario (basico)</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="fields.css"> 
</head>
<body>
  <h2>Formulario de contrato</h2>
  <form>
        <!-- SIMPLE INPUTS -->
    <fieldset>
      <legend>Información Personal</legend>
        <div class="form_imput">
          <label>Nombre completo
            <input type="text" placeholder="Jane Doe">
          </label>
        </div>

        <div class="form_imput">
          <label>Correo Electrónico
            <input type="email" placeholder="jane.doe@example.com">
          </label>
        </div>
    </fieldset>


    <!-- SELECTS & OPTION -->
    <div class="form_imput">
      <label>Tipo de USuario
        <select name="user_type">
          <option value="cliente">Cliente</option>
          <option value="proveedor">Proveedor</option>
          <option value="empleado">Empleado</option>
        </select>
      </label>
    </div>


        <!-- DATALIST & OPTION -->
    <div class="form_imput">
      <label> Referente
        <input list="referente" name="referente" placeholder="Selecciona un referente">
        <datalist id="referente" name="type.of.user">
          <option value="Juan Perez"> La persona que me refirio</option>
          <option value="Una empresa"> La empresa donde trabajo</option>
          <option value="Un amigo">
        </datalist>
      </label>
    </div>


    <!-- TEXT AREA -->
    <div class="form_imput">
      <label>Mensaje
        <textarea  rows ="8" placeholder="Escribe tu mensaje aquí..."></textarea>
      </label>
    </div>


    <div class="form_imput">
      <label> Acepto los terminos y condiciones
        <input type="checkbox" id="terms" class="checkbox">
      </label>
    </div>
  </form>
</body>
</html>
